<!DOCTYPE html>
<html>
<head>
    <title>Smart Recipe Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Smart Recipe Finder</h1>

        <p>Enter ingredients you have:</p>

        <input
            type="text"
            id="ingredients"
            placeholder="Example: egg, onion, tomato"
        >

        <button onclick="findRecipes()">
            Find Recipes
        </button>

        <div id="results"></div>
    </div>

    <script src="script.js"></script>

</body>
</html>
